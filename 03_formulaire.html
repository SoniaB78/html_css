<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaires HTML</title>
    <link rel="stylesheet" href="css/03_formulaire.css">
</head>
<body>
    <!-- je déclare mon formulaire avec la balise form -->
    <form>

        <!-- pseudo -->
        <label>
            Pseudonyme
            <input type="text" id="pseudo" name="pseudo" placeholder="exemple" required> 
            <!-- l'id sert à utiliser la donnée avec d'autres langages, 
                le placeholder contient le texte qui apparaît dans l'input
                type précise le type de donnée récupérée
                required précise au navigateur que le champs est à renseigner obligatoirement
            -->
        </label>

        <br>

        <!-- mot de passe -->
        <label for="mdp"> 
            Mot de passe <span title="le mot de passe peut contenir....">*</span>
        </label>
        <input type="password" name="mdp" placeholder="Mot de passe" required>

        <br>

        <!-- email -->
        <label for="email">Email</label>
        <input type="email" name="email" placeholder="Email">

        <br>

        <!-- fichier -->
        <label for="photo">Photo</label>
        <input type="file" name="photo">
        
        <br>
        <br>

        <!-- cases à cocher checkbox-->
        <!-- plusieurs choix -->
        <label for="question1">Quelle destination choisissez-vous?</label>     
        <p>
            <input type="checkbox" name="reponse01">Italie
            <input type="checkbox" name="reponse02">Tunisie
            <input type="checkbox" name="reponse03">Espagne
        </p>

        <br>
        <br>

        <!-- cases à cocher radio-->
        <!-- un choix -->
        <label for="question1">Qui seront vos accompagnateurs?</label>     
        <p>
            <input type="radio" name="reponse11">En famille
            <input type="radio" name="reponse12" checked>Entre amis <!-- checked = coché par défaut -->
            <input type="radio" name="reponse13">Solo
        </p><!-- un seul choix avec les bouton radio on force l'utilisateur à choisir-->
        
        <br>
        <br>

        <!-- zone de texte -->
        <label for="commentaires">Commentaires</label>
        <textarea name="commentaires" cols="80" rows="8"></textarea>
        <!-- rows=nombre de lignes - cols=nombre de colonnes/caractères -->

        <br>

        <!-- bouton envoi du formulaire -->
        <input type="submit" name="inscription" value="Envoyer">

        <!-- bouton pour vider le formulaire -->
        <input type="reset" name="annuler" value="Annuler">

        <br>

        <a href="https://www.w3schools.com/html/html_form_input_types.asp" target="_blank" rel="noopener noreferrer">W3school, les types d'input</a>

        <br>
        
        <a href="https://developer.mozilla.org/fr/docs/Web/HTML/Element/Input" target="_blank" rel="noopener noreferrer">Petite documentaton</a>
    </form>
</body>
</html>
