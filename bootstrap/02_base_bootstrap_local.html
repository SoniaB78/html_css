<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap en local</title>

    <!-- Lien vers CSS Bootstrap en local -->
    <link rel="stylesheet" href="lib/css/bootstrap.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Contenu HTML -->
    <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">

        <div class="carousel-inner">
            <div class="carousel-item active">
            <img src="img/img1.jpg" class="d-block w-100" alt="alternative textuelle volante">
            </div>
            <div class="carousel-item">
            <img src="img/img2.jpg" class="d-block w-100" alt="alternative textuelle volante">
            </div>
            <div class="carousel-item">
            <img src="img/img3.jpg" class="d-block w-100" alt="alternative textuelle volante">
            </div>
        </div>
        
        <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </a>

        <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </a>
        
    </div>

    <!-- Lien vers JS Bootstrap en local -->
    <script src="lib/js/jquery-3.3.1.min.js"></script>
    <script src="lib/js/popper.js"></script>
    <script src="lib/js/bootstrap.min.js"></script>
</body>
</html>
